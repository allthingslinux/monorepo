# =============================================================================
# ATL Chat - Root Docker Compose
# =============================================================================
# Orchestrates all services across the entire stack.
# All compose fragments live under infra/compose/
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose --profile dev up  # Start with dev services (Dozzle, etc.)
# =============================================================================

name: atl

include:
  - infra/compose/networks.yaml
  - infra/compose/cert-manager.yaml
  - infra/compose/chat-irc.yaml
  - infra/compose/chat-xmpp.yaml
  - infra/compose/chat-bridge.yaml
  - infra/compose/chat-lounge.yaml
  - infra/compose/chat-obsidian.yaml
  - infra/compose/chat-fluux.yaml
  - infra/compose/network.yaml
  - infra/compose/observability.yaml

services:
  dozzle:
    image: amir20/dozzle:v8
    container_name: dozzle
    restart: unless-stopped
    profiles: [ "dev" ]
    ports:
      - "${DOZZLE_PORT:-8082}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILES:-5}"
        compress: "true"
    environment:
      - DOZZLE_FILTER=name=atl-*
    networks:
      - atl-chat
