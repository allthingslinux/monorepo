---
name: Chat Web CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/chat-web/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/chat-web-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/chat-web/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/chat-web-ci.yml"
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.28.2"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - name: Cache Turborepo
        uses: rharkor/caching-for-turbo@0abc2381e688c4d2832f0665a68a01c6e82f0d6c # v2.3.11
      - name: Lint
        run: pnpm exec ultracite check apps/chat-web
      - name: Type check
        run: pnpm --filter @atl/chat-web exec tsc --noEmit
      - name: Build
        run: pnpm exec turbo run build --filter=@atl/chat-web
