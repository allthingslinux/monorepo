name: Pubnix CI

on:
  push:
    branches: [main]
    paths:
      - "infra/sh/**"
      - ".github/workflows/pubnix-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/sh/**"
      - ".github/workflows/pubnix-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@6b9c6063abd6010835c3c7f4a7d0c4e2f17d8b9a # v5
        with:
          enable-cache: true
      - run: uv sync
        working-directory: infra/sh
      - run: uv run ansible-lint
        working-directory: infra/sh/ansible

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~1.8"
      - run: terraform init -backend=false
        working-directory: infra/sh/terraform
      - run: terraform fmt -check -recursive
        working-directory: infra/sh/terraform
      - run: terraform validate
        working-directory: infra/sh/terraform

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: shellcheck infra/sh/scripts/deb-check
