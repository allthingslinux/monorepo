name: Chat CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      irc: ${{ steps.filter.outputs.irc }}
      xmpp: ${{ steps.filter.outputs.xmpp }}
      bridge: ${{ steps.filter.outputs.bridge }}
      clients: ${{ steps.filter.outputs.clients }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            irc:
              - 'services/chat/irc/**'
              - 'services/chat/irc-services/**'
              - 'services/chat/irc-webpanel/**'
            xmpp:
              - 'services/chat/xmpp/**'
            bridge:
              - 'apps/bridge/**'
            clients:
              - 'services/chat/irc-client-lounge/**'
              - 'services/chat/irc-client-obsidian/**'
              - 'services/chat/xmpp-client-fluux/**'
            infra:
              - 'infra/**'
              - 'compose.yaml'
              - '.github/workflows/ci-chat.yml'

  check-bridge:
    needs: changes
    if: needs.changes.outputs.bridge == 'true'
    uses: ./.github/workflows/reusable-py-check.yml
    with:
      python-version: "3.12"
      working-directory: apps/bridge

  test-bridge:
    needs: [changes, check-bridge]
    if: needs.changes.outputs.bridge == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@6b9c6063abd6010835c3544eaaeab6a6af3f3f0d # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --all-extras
      - run: uv run pytest apps/bridge/tests -v --tb=short

  docker-irc:
    needs: changes
    if: needs.changes.outputs.irc == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      context: services/chat/irc
      image-name: ghcr.io/allthingslinux/irc
      push: ${{ github.ref == 'refs/heads/main' }}

  docker-irc-services:
    needs: changes
    if: needs.changes.outputs.irc == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      context: services/chat/irc-services
      image-name: ghcr.io/allthingslinux/irc-services
      push: ${{ github.ref == 'refs/heads/main' }}

  docker-xmpp:
    needs: changes
    if: needs.changes.outputs.xmpp == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      context: services/chat/xmpp
      image-name: ghcr.io/allthingslinux/xmpp
      push: ${{ github.ref == 'refs/heads/main' }}

  docker-bridge:
    needs: [changes, test-bridge]
    if: needs.changes.outputs.bridge == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      context: apps/bridge
      image-name: ghcr.io/allthingslinux/bridge
      push: ${{ github.ref == 'refs/heads/main' }}
