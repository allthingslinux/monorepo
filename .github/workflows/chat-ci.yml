name: Chat CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "services/chat/**"
      - "apps/bridge/**"
      - "infra/**"
      - "compose.yaml"
      - ".github/workflows/chat-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/chat/**"
      - "apps/bridge/**"
      - "infra/**"
      - "compose.yaml"
      - ".github/workflows/chat-ci.yml"
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: File Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      irc: ${{ steps.chat_changes.outputs.irc_any_changed }}
      xmpp: ${{ steps.chat_changes.outputs.xmpp_any_changed }}
      bridge: ${{ steps.chat_changes.outputs.bridge_any_changed }}
      clients: ${{ steps.chat_changes.outputs.clients_any_changed }}
      infra: ${{ steps.chat_changes.outputs.infra_any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Detect chat-related changes
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: chat_changes
        with:
          files_yaml: |
            irc:
              - services/chat/irc-server/**
              - services/chat/irc-services/**
              - services/chat/irc-webpanel/**
            xmpp:
              - services/chat/xmpp-server/**
            bridge:
              - apps/bridge/**
            clients:
              - services/chat/irc-client-lounge/**
              - services/chat/irc-client-obsidian/**
              - services/chat/xmpp-client-fluux/**
            infra:
              - infra/**
              - compose.yaml
              - .github/workflows/chat-ci.yml

  check-bridge:
    needs: changes
    if: needs.changes.outputs.bridge == 'true' || github.event_name == 'merge_group'
    uses: ./.github/workflows/reusable-py-check.yml
    with:
      python-version: "3.12"
      working-directory: apps/bridge

  test-bridge:
    needs: [changes, check-bridge]
    if: needs.changes.outputs.bridge == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835c3544eaaeab6a6af3f3f0d # v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run tests with coverage
        run: |
          uv run pytest apps/bridge/tests \
            -n auto \
            -v --tb=short \
            --cov=src/bridge --cov-report=xml:coverage.xml \
            --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: bridge
          fail_ci_if_error: false
          verbose: true
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: junit.xml
      - name: Prune uv cache for CI
        if: always()
        run: uv cache prune --ci

  validate-infra:
    name: Infra Compose Validation
    needs: changes
    if: needs.changes.outputs.infra == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate compose configuration
        run: docker compose config -q

  validate-clients:
    name: Client Assets Check
    needs: changes
    if: needs.changes.outputs.clients == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify client directories exist
        run: |
          set -euo pipefail
          for d in services/chat/irc-client-lounge services/chat/irc-client-obsidian services/chat/xmpp-client-fluux; do
            if [ ! -d "$d" ]; then
              echo "missing directory: $d"
              exit 1
            fi
          done

  docker-irc:
    needs: changes
    if: needs.changes.outputs.irc == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      context: services/chat/irc-server
      image-name: ghcr.io/allthingslinux/irc-server
      push: ${{ github.ref == 'refs/heads/main' }}

  docker-irc-services:
    needs: changes
    if: needs.changes.outputs.irc == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      context: services/chat/irc-services
      image-name: ghcr.io/allthingslinux/irc-services
      push: ${{ github.ref == 'refs/heads/main' }}

  docker-xmpp:
    needs: changes
    if: needs.changes.outputs.xmpp == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      context: services/chat/xmpp-server
      image-name: ghcr.io/allthingslinux/xmpp-server
      push: ${{ github.ref == 'refs/heads/main' }}

  docker-bridge:
    needs: [changes, test-bridge]
    if: needs.changes.outputs.bridge == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      context: apps/bridge
      image-name: ghcr.io/allthingslinux/bridge
      push: ${{ github.ref == 'refs/heads/main' }}
