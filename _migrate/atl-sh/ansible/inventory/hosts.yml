---
# atl.sh inventory — dev (Vagrant VM), staging (Hetzner VPS), prod (physical)
#
# Usage:
#   just deploy dev      → -l dev (group → atl-sh-dev host)
#   just deploy staging  → -l staging  (ATL_HOST → staging.{{ ATL_HOST }})
#   just deploy prod     → -l prod     (ATL_HOST as-is)
#
# Host names differ from group names to avoid Ansible "group and host same name" warning.
#
# Set ATL_HOST to override base domain (default: atl.sh)
#   staging → staging.atl.sh, prod → atl.sh

all:
  vars:
    _atl_host: "{{ lookup('env', 'ATL_HOST') | default('atl.sh', true) }}"

  children:
    # Local development VM (Vagrant)
    dev:
      hosts:
        atl-sh-dev:
          ansible_host: 127.0.0.1
          ansible_port: 2223
          ansible_user: root
          ansible_ssh_private_key_file: ../.ssh/dev_key
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    # Staging: Terraform-provisioned Hetzner Cloud VPS
    staging:
      hosts:
        atl-sh-staging:
          ansible_host: "staging.{{ _atl_host }}"
          ansible_user: root

    # Production: Physical Hetzner server
    prod:
      hosts:
        atl-sh-prod:
          ansible_host: "{{ _atl_host }}"
          ansible_user: root
