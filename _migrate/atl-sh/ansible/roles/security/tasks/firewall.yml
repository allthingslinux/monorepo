---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"
  changed_when: false

- name: Rate limit SSH
  community.general.ufw:
    rule: limit
    port: "22"
    proto: tcp
  when: firewall_rate_limit_ssh
  changed_when: false

- name: Enable ufw
  community.general.ufw:
    state: enabled
