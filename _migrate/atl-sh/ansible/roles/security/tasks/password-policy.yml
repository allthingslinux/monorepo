---
# Password quality enforcement
- name: Install libpam-pwquality
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
    update_cache: true

- name: Configure password quality requirements
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^{{ item.key }}"
    line: "{{ item.key }} = {{ item.value }}"
    state: present
  loop:
    - { key: 'minlen', value: '8' }
    - { key: 'dcredit', value: '-1' }
    - { key: 'ucredit', value: '-1' }
    - { key: 'lcredit', value: '-1' }
    - { key: 'ocredit', value: '-1' }
    - { key: 'maxsequence', value: '3' }
    - { key: 'maxrepeat', value: '3' }
    - { key: 'dictcheck', value: '1' }
    - { key: 'enforcing', value: '1' }

- name: Configure password history
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password\s+required\s+pam_pwhistory.so'
    line: 'password required pam_pwhistory.so remember=5 use_authtok'
    insertafter: '^password\s+requisite\s+pam_pwquality.so'
    state: present

- name: Configure account lockout
  ansible.builtin.blockinfile:
    path: /etc/pam.d/common-auth
    marker: "# {mark} ANSIBLE MANAGED - Account lockout"
    insertbefore: '^auth\s+\[success=1'
    block: |
      auth required pam_faillock.so preauth silent audit deny=5 unlock_time=900
      auth [default=die] pam_faillock.so authfail audit deny=5 unlock_time=900
    state: present

- name: Configure faillock in account phase
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-account
    line: 'account required pam_faillock.so'
    insertbefore: '^account\s+\[success=1'
    state: present
