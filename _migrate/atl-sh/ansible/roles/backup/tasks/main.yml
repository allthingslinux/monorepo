---
- name: Install borgbackup and borgmatic
  ansible.builtin.apt:
    name:
      - borgbackup
      - borgmatic
    state: present

- name: Create borgmatic config directory
  ansible.builtin.file:
    path: /etc/borgmatic
    state: directory
    mode: "0700"

- name: Deploy borgmatic config
  ansible.builtin.template:
    src: borgmatic.config.yml.j2
    dest: /etc/borgmatic/config.yaml
    mode: "0600"

- name: Enable borgmatic timer
  ansible.builtin.systemd:
    name: borgmatic.timer
    enabled: true
    state: started
