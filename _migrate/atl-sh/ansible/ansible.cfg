[defaults]
inventory      = inventory/hosts.yml
roles_path     = ../.ansible/roles:roles
collections_path = ../.ansible/collections
retry_files_enabled = False
host_key_checking = False
stdout_callback = default
result_format = yaml
# Performance: pipelining reduces SSH round-trips
pipelining = True
# Smarter fact gathering: skip when not needed
gathering = smart
# Silence Python interpreter discovery warning (Debian has python3)
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
