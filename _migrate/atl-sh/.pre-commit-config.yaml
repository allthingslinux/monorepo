---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # NOTE: ansible-lint removed from pre-commit due to known hanging issues
  # with pre-commit 4.x + ansible-lint v26. Run via `just lint` instead.
  # See: https://forum.ansible.com/t/ansible-lint-hook-no-longer-works-with-pre-commit-4-3-0/44792

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_docs
