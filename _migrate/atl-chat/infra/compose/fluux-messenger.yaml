# =============================================================================
# Fluux Messenger - Modern XMPP Web Client
# =============================================================================
# React + Vite XMPP client by ProcessOne. Connects to Prosody via WebSocket.
# Built from upstream source (processone/fluux-messenger).
# Served at webxmpp.atl.chat with TLS via shared wildcard certs.
# =============================================================================

name: atl-fluux-messenger

include:
  - networks.yaml

services:
  atl-fluux-messenger:
    build:
      context: ../../apps/fluux-messenger
      dockerfile: Containerfile
      args:
        FLUUX_VERSION: ${FLUUX_VERSION:-v0.13.3}
    container_name: atl-fluux-messenger
    hostname: atl-fluux-messenger
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_READ_SEARCH

    depends_on:
      atl-xmpp-server:
        condition: service_healthy

    ports:
      - "${FLUUX_MESSENGER_PORT:-8091}:80"
      - "${FLUUX_MESSENGER_HTTPS_PORT:-8443}:443"

    volumes:
      - ../../data/certs:/etc/nginx/certs:ro

    environment:
      - FLUUX_DOMAIN=${FLUUX_DOMAIN:-webxmpp.atl.chat}
      - FLUUX_CERT_DOMAIN=${FLUUX_CERT_DOMAIN:-atl.chat}
      - CERT_DIR=/etc/nginx/certs
      - XMPP_DOMAIN=${XMPP_DOMAIN:-xmpp.localhost}

    env_file:
      - path: ../../.env
        required: false

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILES:-5}"
        compress: "true"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - atl-chat
