---
# ATL Bridge — Configuration template (envsubst)
# Generated by prepare-config.sh. Secrets from env (BRIDGE_DISCORD_TOKEN, BRIDGE_PORTAL_*, etc.).
# Channel mappings: Discord channel ID <-> IRC server/channel <-> XMPP MUC JID
# Discord channel ID from BRIDGE_DISCORD_CHANNEL_ID (set in .env)
mappings:
  - discord_channel_id: ${BRIDGE_DISCORD_CHANNEL_ID}
    irc:
      server: ${IRC_BRIDGE_SERVER}
      port: ${IRC_TLS_PORT}
      tls: true
      channel: '#general'
    xmpp:
      muc_jid: general@muc.${PROSODY_DOMAIN}
# Toggles
announce_joins_and_quits: true
announce_extras: false

# Timeouts and limits
identity_cache_ttl_seconds: 3600
avatar_cache_ttl_seconds: 86400
# XMPP avatar: base URL for bridge to HEAD-check (required in Docker; use internal hostname)
xmpp_avatar_base_url: ${XMPP_AVATAR_BASE_URL}
# XMPP avatar: public URL that Discord can fetch (e.g. https://xmpp.atl.chat)
xmpp_avatar_public_url: ${XMPP_AVATAR_PUBLIC_URL}
irc_puppet_idle_timeout_hours: 24
irc_puppet_postfix: ''

# IRC flood control and rejoin
irc_throttle_limit: 10
irc_message_queue: 30
irc_rejoin_delay: 5
irc_auto_rejoin: true

# IRC TLS: set false for dev with self-signed certs (env: BRIDGE_IRC_TLS_VERIFY)
irc_tls_verify: ${IRC_TLS_VERIFY}

# RELAYMSG: clean nicks (no /d suffix). relaymsg-atl always allows clean nicks.
irc_relaymsg_clean_nicks: true

# IRC REDACT: send REDACT when Discord message deleted. Disabled by default: UnrealIRCd third/redact
# segfaults on REDACT (exit 139). Set true after upstream fix.
irc_redact_enabled: false

# IRC SASL (optional)
irc_use_sasl: false
irc_sasl_user: ''
irc_sasl_password: ''
