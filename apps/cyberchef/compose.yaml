services:
  cyberchef:
    image: ghcr.io/gchq/cyberchef:latest
    container_name: atl-cyberchef
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:?TAILSCALE_IP is required}:${CYBERCHEF_PORT:-1337}:80"
    networks:
      - atl-tools

include:
  - ../networks.yaml
