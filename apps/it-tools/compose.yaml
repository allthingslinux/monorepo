services:
  it-tools:
    image: ghcr.io/sharevb/it-tools:v2026.1.4
    container_name: atl-it-tools
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:?TAILSCALE_IP is required}:${IT_TOOLS_PORT:-8083}:8080"
    networks:
      - atl-tools

include:
  - ../networks.yaml
