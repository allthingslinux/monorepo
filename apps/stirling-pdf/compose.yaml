# =============================================================================
# Stirling-PDF — Self-hosted PDF manipulation tool
# https://github.com/Stirling-Tools/Stirling-PDF
# =============================================================================

services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: atl-stirling-pdf
    restart: unless-stopped
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      SECURITY_ENABLELOGIN: "false"
      PUID: 1000
      PGID: 1000
      SYSTEM_DEFAULTLOCALE: en-US
      UI_APPNAME: "pdf.atl.tools"
      UI_APPNAMENAVBAR: "pdf.atl.tools"
      SYSTEM_MAXFILESIZE: "100"
    volumes:
      - ../../data/stirling-pdf/training:/usr/share/tessdata:rw
      - ../../data/stirling-pdf/configs:/configs:rw
      - ../../data/stirling-pdf/logs:/logs:rw
      - ../../data/stirling-pdf/custom:/customFiles:rw
    ports:
      - "${TAILSCALE_IP:?TAILSCALE_IP is required}:${STIRLING_PDF_PORT:-8084}:8080"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP' && curl -fL http://localhost:8080/ -o /dev/null"]
      interval: 5s
      timeout: 10s
      retries: 16
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - atl-tools

include:
  - ../networks.yaml
