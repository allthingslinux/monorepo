---
# ATL Bridge — Example configuration
# Copy to config.yaml and fill in values. Secrets from env (BRIDGE_DISCORD_TOKEN, BRIDGE_PORTAL_*, etc.).
# Channel mappings: Discord channel ID <-> IRC server/channel <-> XMPP MUC JID
mappings:
  - discord_channel_id: '123456789012345678'
    irc:
      server: irc.atl.chat
      port: 6697
      tls: true
      channel: '#bridge'
    xmpp:
      muc_jid: bridge@muc.atl.chat
# Optional: overrides from env (see docs for BRIDGE_DISCORD_TOKEN, BRIDGE_PORTAL_BASE_URL, etc.)

# Toggles (AUDIT §5)
announce_joins_and_quits: true
announce_extras: false  # topics, mode changes

# Timeouts and limits
identity_cache_ttl_seconds: 3600
avatar_cache_ttl_seconds: 86400
irc_puppet_idle_timeout_hours: 24

# Optional: puppet postfix (e.g. "|d" so nicks show as Alice|d)
irc_puppet_postfix: ''

# IRC flood control and rejoin
irc_throttle_limit: 10  # messages per second
irc_message_queue: 30  # max queue size
irc_rejoin_delay: 5  # seconds before rejoin after KICK/disconnect
irc_auto_rejoin: true

# IRC TLS: false for dev (self-signed certs), true for prod
irc_tls_verify: true

# RELAYMSG: clean nicks (no /d suffix). relaymsg-atl always allows clean nicks.
irc_relaymsg_clean_nicks: true

# IRC REDACT: set true when UnrealIRCd third/redact segfault is fixed
irc_redact_enabled: false

# Paste service for code block uploads (Discord -> IRC/XMPP)
# PrivateBin instance URL. Defaults to https://paste.atl.tools/
# paste_service_url: https://paste.atl.tools/

# IRC SASL (optional)
irc_use_sasl: false
irc_sasl_user: ''
irc_sasl_password: ''

# XMPP: when receiving XEP-0424 user retraction, also send XEP-0425 moderation
# so Dino (and similar clients) delete locally. Requires bridge component JID to be MUC moderator.
xmpp_promote_retraction_to_moderation: true

# Message content filtering (regex list; matching messages are not bridged)
# content_filter_regex: ["spam", "\\bblocked\\b"]
