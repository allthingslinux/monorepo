# =============================================================================
# SearXNG — Privacy-respecting metasearch engine
# https://github.com/searxng/searxng
# =============================================================================

services:
  searxng:
    image: searxng/searxng:latest
    container_name: atl-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=https://search.atl.tools/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?SEARXNG_SECRET is required}
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - ./limiter.toml:/etc/searxng/limiter.toml:ro
      - ../../data/searxng:/var/cache/searxng:rw
    ports:
      - "${TAILSCALE_IP:?TAILSCALE_IP is required}:${SEARXNG_PORT:-8082}:8080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - atl-tools
      - searxng-internal

  valkey:
    image: valkey/valkey:8-alpine
    container_name: atl-searxng-valkey
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - ../../data/searxng/valkey:/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - searxng-internal

networks:
  searxng-internal:
    driver: bridge
    internal: true

include:
  - ../networks.yaml
