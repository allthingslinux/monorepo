---
# Shared variables for all hosts

# Domain
pubnix_domain: atl.sh
admin_email: admin@allthingslinux.org

# System
timezone: UTC
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org

# User defaults
pubnix_group: users
default_shell: /bin/bash

# Web
tilde_docroot: public_html

# Monitoring
node_exporter_version: "1.8.2"

# Resource limits (PAM)
user_nproc_limit: 100
user_nofile_limit: 1024
user_as_limit: 8000000
user_rss_limit: 8000000

# Resource limits (systemd cgroups)
user_cpu_quota: 200%
user_memory_max: 1.5G
user_tasks_max: 200

# Quotas
quota_soft: 5G
quota_hard: 6G

# Backup
backup_retention_daily: 7
backup_retention_weekly: 4
backup_retention_monthly: 6
backup_paths:
  - /home
  - /etc
  - /var/spool/cron
