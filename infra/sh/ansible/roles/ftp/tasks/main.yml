---
- name: Install vsftpd
  ansible.builtin.apt:
    name: vsftpd
    state: present

- name: Ensure vsftpd empty directory exists
  ansible.builtin.file:
    path: /var/run/vsftpd/empty
    state: directory
    mode: '0755'

- name: Deploy vsftpd configuration
  ansible.builtin.template:
    src: vsftpd.conf.j2
    dest: /etc/vsftpd.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart vsftpd

- name: Ensure vsftpd is enabled and started
  ansible.builtin.systemd:
    name: vsftpd
    enabled: true
    state: started
