# All Things Linux - User Log Rotation Configuration
# This file is automatically run daily by the system if it exists.
# You can add your own log files here.
# For more information, run 'man logrotate'.

# Default rotation for your local state logs
"~/.local/state/log/*.log" {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0600
}

# Example: Rotate your web CGI logs if you redirect them
# "~/.local/state/log/cgi.log" {
