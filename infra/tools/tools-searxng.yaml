# =============================================================================
# SearXNG — Privacy-respecting metasearch engine
# https://github.com/searxng/searxng
# =============================================================================

services:
  atl-tools-searxng:
    image: searxng/searxng:latest
    container_name: atl-tools-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=https://search.atl.tools/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?SEARXNG_SECRET is required}
    volumes:
      - ../../services/tools/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ../../services/tools/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
      - ../../services/tools/searxng/data:/var/cache/searxng:rw
    ports:
      - "${TAILSCALE_IP:?TAILSCALE_IP is required}:${SEARXNG_PORT:-8082}:8080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILES:-5}"
        compress: "true"
    depends_on:
      atl-tools-searxng-valkey:
        condition: service_healthy
    networks:
      - atl-tools
      - atl-tools-searxng-internal

  atl-tools-searxng-valkey:
    image: valkey/valkey:8-alpine
    container_name: atl-tools-searxng-valkey
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - ../../services/tools/searxng/data/valkey:/data
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILES:-5}"
        compress: "true"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - atl-tools-searxng-internal

networks:
  atl-tools-searxng-internal:
    driver: bridge
    internal: true
