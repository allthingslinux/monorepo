# Original: https://github.com/CorentinTh/it-tools
# Fork with improvements we are using: https://github.com/sharevb/it-tools
# =============================================================================

services:
  atl-tools-it-tools:
    image: ghcr.io/sharevb/it-tools:latest
    container_name: atl-tools-it-tools
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:?TAILSCALE_IP is required}:${IT_TOOLS_PORT:-8083}:8080"
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILES:-5}"
        compress: "true"
    networks:
      - atl-tools
