# =============================================================================
# ConvertX — Self-hosted file conversion tool
# https://github.com/C4illin/ConvertX
# =============================================================================

services:
  atl-tools-convertx:
    image: ghcr.io/c4illin/convertx:v0.17.0
    container_name: atl-tools-convertx
    restart: unless-stopped
    environment:
      - JWT_SECRET=${CONVERTX_JWT_SECRET:?CONVERTX_JWT_SECRET is required}
      - ALLOW_UNAUTHENTICATED=${CONVERTX_ALLOW_UNAUTHENTICATED:-true}
      - HIDE_HISTORY=true
      - AUTO_DELETE_EVERY_N_HOURS=1
    volumes:
      - ../../services/tools/convertx/data:/app/data
    ports:
      - "${TAILSCALE_IP:?TAILSCALE_IP is required}:${CONVERTX_PORT:-3001}:3000"
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILES:-5}"
        compress: "true"
    networks:
      - atl-tools
