networks:
  atl-metrics:
    driver: bridge
  atl-chat:
    external: true
    name: atl-chat
  tux:
    external: true
    name: tux
  wiki-network:
    external: true
    name: local-wiki_wiki-network
  iso-network:
    external: true
    name: iso_default
  npm:
    external: true
    name: npm

volumes:
  atl-loki-data:
  atl-grafana-data:
  atl-mimir-data:
  atl-influxdb-data:
  atl-influxdb-plugins:

services:
  # Grafana Alloy - OpenTelemetry Collector + Prometheus Agent
  atl-alloy:
    image: grafana/alloy:latest
    container_name: atl-alloy
    restart: unless-stopped
    networks:
      - atl-metrics
      - atl-chat # Access to atl-xmpp-db
      - tux # Access to tux-postgres, tux-valkey
      - iso-network # Access to iso_postgres
      - wiki-network # Access to local-wiki-valkey
    ports:
      - "12345:12345" # Alloy UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - ../../services/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/alloy:/var/lib/alloy
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    environment:
      # Cloudflare Worker Logs
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CF_API_TOKEN=${CF_API_TOKEN}
      # Postgres Exporter Credentials
      - XMPP_DB_PASSWORD=${XMPP_DB_PASSWORD}
      - TUX_DB_USER=${TUX_DB_USER}
      - TUX_DB_PASSWORD=${TUX_DB_PASSWORD}
      - TUX_DB_NAME=${TUX_DB_NAME}
      - ISO_DB_PASSWORD=${ISO_DB_PASSWORD}
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /et../../services/observability/alloy/config.alloy
    depends_on:
      - atl-loki

  # Grafana Loki - Log Aggregation
  atl-loki:
    image: grafana/loki:3.6.0
    container_name: atl-loki
    restart: unless-stopped
    networks:
      - atl-metrics
    ports:
      - "3100:3100"
    volumes:
      - ../../services/observability/loki/config.yml:/mnt/config/loki-config.yml:ro
      - atl-loki-data:/loki
    command:
      - -config.file=/mnt/config/loki-config.yml
    user: "10001:10001" # Run as loki user (UID 10001)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana Mimir - Long-term Metrics Storage
  atl-mimir:
    image: grafana/mimir:latest
    container_name: atl-mimir
    restart: unless-stopped
    networks:
      - atl-metrics
    ports:
      - "8080:8080" # HTTP API
      - "9095:9095" # gRPC
    volumes:
      - ../../services/observability/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - ../../services/observability/mimir/rules:/data/rules:ro
      - atl-mimir-data:/data
    environment:
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
    command:
      - -config.file=/et../../services/observability/mimir/mimir.yaml
      - -target=all # Monolithic mode

  # Grafana - Visualization
  atl-grafana:
    image: grafana/grafana:latest
    container_name: atl-grafana
    restart: unless-stopped
    networks:
      - atl-metrics
      - npm
    ports:
      - "3000:3000"
    volumes:
      - ../../services/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - atl-grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://metrics.atl.services
      - GF_SERVER_DOMAIN=metrics.atl.services
      # SSO Configuration
      # SSO Configuration
      - GF_AUTH_GENERIC_OAUTH_ENABLED=false
      - GF_AUTH_OKTA_ENABLED=true
      - GF_AUTH_OKTA_NAME=Okta
      - GF_AUTH_OKTA_CLIENT_ID=${OKTA_CLIENT_ID}
      - GF_AUTH_OKTA_CLIENT_SECRET=${OKTA_CLIENT_SECRET}
      - GF_AUTH_OKTA_SCOPES=openid profile email groups offline_access
      - GF_AUTH_OKTA_AUTH_URL=${OKTA_AUTH_URL}
      - GF_AUTH_OKTA_TOKEN_URL=${OKTA_TOKEN_URL}
      - GF_AUTH_OKTA_API_URL=${OKTA_API_URL}
      - GF_AUTH_OKTA_USE_REFRESH_TOKEN=true
      # RBAC & Group Sync
      - GF_AUTH_OKTA_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'Admins') && 'Admin' || contains(groups[*], 'Editors') && 'Editor' || 'Viewer'
      - GF_AUTH_OKTA_ALLOWED_GROUPS=Admins,Editors,Viewers
      # Alert State History (Loki Backend)
      - GF_UNIFIED_ALERTING_STATE_HISTORY_ENABLED=true
      - GF_UNIFIED_ALERTING_STATE_HISTORY_BACKEND=loki
      - GF_UNIFIED_ALERTING_STATE_HISTORY_LOKI_REMOTE_URL=http://atl-loki:3100
      - GF_FEATURE_TOGGLES_ENABLE=alertingCentralAlertHistory
      # Internal Monitoring
      - GF_METRICS_ENABLED=true
      # Datasources Secrets
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    depends_on:
      - atl-loki
      - atl-mimir

  # InfluxDB 3 Core - Time-series Database
  atl-influxdb:
    image: influxdb:3-core
    container_name: atl-influxdb
    restart: unless-stopped
    networks:
      - atl-metrics
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
    volumes:
      - atl-influxdb-data:/var/lib/influxdb3/data
      - atl-influxdb-plugins:/var/lib/influxdb3/plugins
    environment:
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Blackbox Exporter - Uptime Monitoring (HTTP/DNS/TCP)
  atl-blackbox:
    image: prom/blackbox-exporter:latest
    container_name: atl-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    networks:
      - atl-metrics
    command: --config.file=/config/blackbox.yml
    volumes:
      - ../../services/observability/blackbox/blackbox.yml:/config/blackbox.yml:ro
    # Health check to ensure prober is running
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9115/-/healthy"]
      interval: 30s
      timeout: 3s
